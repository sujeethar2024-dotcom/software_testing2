<!DOCTYPE html>
<html>
<head>
<title>GlobeTales</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Poppins,sans-serif;}
body{background:#f2f2f2;}

nav{
background:#111;
color:white;
padding:15px 10%;
display:flex;
justify-content:space-between;
}

.hero{
height:60vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(to right,#00b894,#0984e3);
color:white;
text-align:center;
}

.section-title{
text-align:center;
margin:40px 0;
}

.destinations{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
gap:30px;
padding:0 10% 60px;
}

.card{
background:white;
border-radius:15px;
overflow:hidden;
box-shadow:0 10px 25px rgba(0,0,0,0.15);
}

.card img{
width:100%;
height:200px;
object-fit:cover;
}

.card-content{
padding:20px;
}
</style>

</head>
<body>

<nav>
<h2>🌍 GlobeTales</h2>
</nav>

<section class="hero">
<h1>Travel Across The Globe</h1>
</section>

<h2 class="section-title">India & Its Places</h2>

<div class="destinations">

<div class="card">
<img src="https://images.unsplash.com/photo-1524492412937-b28074a5d7da?auto=format&fit=crop&w=800&q=80">
<div class="card-content">
<h3>🇮🇳 India</h3>
<p>Main country overview</p>
</div>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1602216056096-3b40cc0c9944?auto=format&fit=crop&w=800&q=80">
<div class="card-content">
<h3>🌴 Kerala</h3>
<p>Backwaters and greenery.</p>
</div>
</div>

<div class="card">
<img src="https://source.unsplash.com/800x600/?coimbatore">
<div class="card-content">
<h3>🏞 Coimbatore</h3>
<p>Western Ghats beauty.</p>
</div>
</div>

</div>

</body>
</html>
