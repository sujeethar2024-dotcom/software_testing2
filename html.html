<!DOCTYPE html>
<html>
<head>
<title>Logo Image Replacement</title>

<style>

body{
    margin:0;
}
.logo-container{
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}
.logo-container h1{
    width:300px;
    height:120px;
    background:url("logo.png") no-repeat center;
    background-size:contain;
    text-indent:-9999px;
    overflow:hidden;
}

</style>
</head>

<body>

<div class="logo-container">
    <h1>My Company Name</h1>
</div>

</body>
</html>
