<!DOCTYPE html>
<html>
<head>
<title>GlobeTales</title>
<style>

*{margin:0;padding:0;box-sizing:border-box;font-family:Poppins,sans-serif;}
body{background:#f4f4f4;}

nav{
background:#111;
color:white;
padding:15px 10%;
display:flex;
justify-content:space-between;
}

.hero{
height:50vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
background:linear-gradient(to right,#00b894,#0984e3);
color:white;
}

.countries{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:30px;
padding:60px 10%;
}

.country-card{
background:white;
border-radius:15px;
overflow:hidden;
box-shadow:0 10px 25px rgba(0,0,0,0.15);
text-align:center;
transition:0.4s;
}

.country-card img{
width:100%;
height:200px;
object-fit:cover;
}

.country-card:hover{
transform:translateY(-10px);
}

</style>
</head>
<body>

<nav>
<h2>🌍 GlobeTales</h2>
</nav>

<section class="hero">
<h1>Explore The World</h1>
</section>

<section class="countries">

<div class="country-card">
<img src="https://images.unsplash.com/photo-1524492412937-b28074a5d7da?auto=format&fit=crop&w=800&q=80">
<h3>🇮🇳 India</h3>
</div>

<div class="country-card">
<img src="https://images.unsplash.com/photo-1501785888041-af3ef285b470?auto=format&fit=crop&w=800&q=80">
<h3>🇨🇭 Switzerland</h3>
</div>

<div class="country-card">
<img src="https://images.unsplash.com/photo-1508057198894-247b23fe5ade?auto=format&fit=crop&w=800&q=80">
<h3>🇦🇪 Dubai</h3>
</div>

</section>

</body>
</html>
